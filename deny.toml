# ── cargo-deny configuration ────────────────────────────────────────────────
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
copyleft = "allow"
allow = [
    "GPL-2.0-only",
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
