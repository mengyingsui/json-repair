name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust checks ──────────────────────────────────────────────────────────
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-26]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: cargo fmt
        run: cargo fmt --check --all

      - name: cargo test
        run: cargo test -p json-repair-core

      - name: cargo clippy
        run: cargo clippy -p json-repair-core --all-targets -- -D warnings

      - name: cargo bench
        shell: bash
        run: cargo bench -p json-repair-core 2>&1 | tee rust_bench_output.txt

      - name: Rust benchmark summary
        shell: bash
        run: |
          python << 'PYEOF'
          import os, re
          with open('rust_bench_output.txt') as f:
              lines = f.readlines()
          step_summary = os.environ['GITHUB_STEP_SUMMARY']
          with open(step_summary, 'a') as out:
              out.write('## Rust Benchmark Results\n\n')
              out.write('| Benchmark | Time |\n|-----------|------|\n')
              for i, line in enumerate(lines):
                  m = re.match(r'^json_repair/\S+', line)
                  if m and i + 1 < len(lines):
                      tm = re.search(r'\[([^\]]+)\]', lines[i+1])
                      if tm:
                          parts = tm.group(1).split()
                          mean = f'{parts[2]} {parts[3]}'
                          name = m.group().split('/')[1]
                          out.write(f'| {name} | {mean} |\n')
          PYEOF

  # ── Rust dependency audits ───────────────────────────────────────────────
  rust-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans

  # ── Rust fuzzing (nightly, quick smoke test) ────────────────────────────
  rust-fuzz:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (nightly)
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Fuzz repair_json for 30 seconds
        run: cargo +nightly fuzz run repair --fuzz-dir crates/json-repair-core/fuzz -- -max_total_time=30

  # ── Python checks ────────────────────────────────────────────────────────
  python:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        py: ["3.12", "3.13"]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv (Python ${{ matrix.py }})
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.py }}
          enable-cache: true
          cache-suffix: ${{ matrix.os }}-${{ matrix.py }}

      - name: uv sync
        run: uv sync

      - name: Run benchmarks
        run: uv run pytest tests/python/test_performance.py --benchmark-only -v --benchmark-json py_bench.json

      - name: Python benchmark summary
        shell: bash
        run: |
          python << 'PYEOF'
          import json, os
          with open('py_bench.json') as f:
              data = json.load(f)
          step_summary = os.environ['GITHUB_STEP_SUMMARY']
          with open(step_summary, 'a') as out:
              out.write('## Python Benchmark Results\n\n')
              out.write('| Benchmark | Mean (us) |\n|-----------|-----------|\n')
              for b in data['benchmarks']:
                  mean = b['stats']['mean'] * 1e6
                  name = b['name'].replace('test_repair_speed[', '').rstrip(']')
                  out.write(f'| {name} | {mean:.2f} |\n')
          PYEOF

      - name: ruff check
        run: uv run ruff check json_repair/ tests/python/

      - name: mypy check
        run: uv run mypy json_repair/

      - name: pyright check
        run: uv run pyright json_repair/

      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit

  # ── Build wheels (tagged releases only) ──────────────────────────────────
  wheels:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Build wheels
        run: uv build --wheel

      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
