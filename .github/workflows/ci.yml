name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust checks ──────────────────────────────────────────────────────────
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (stable)
        run: rustup toolchain install stable --profile minimal

      - name: cargo test
        run: cargo test -p json-repair-core

      - name: cargo clippy
        run: cargo clippy -p json-repair-core --all-targets -- -D warnings

      - name: cargo bench
        run: cargo bench -p json-repair-core

  # ── Rust dependency audits ───────────────────────────────────────────────
  rust-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans

  # ── Rust fuzzing (nightly, quick smoke test) ────────────────────────────
  rust-fuzz:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (nightly)
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Fuzz repair_json for 30 seconds
        run: cargo +nightly fuzz run repair --fuzz-dir crates/json-repair-core/fuzz -- -max_total_time=30

  # ── Python checks ────────────────────────────────────────────────────────
  python:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        py: ["3.12", "3.13"]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv (Python ${{ matrix.py }})
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.py }}

      - name: uv sync
        run: uv sync

      - name: pytest (with coverage)
        run: uv run pytest --cov=json_repair --cov-report=xml tests/python/ -v

      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml

      - name: ruff check
        run: uv run ruff check json_repair/ tests/python/

      - name: mypy check
        run: uv run mypy json_repair/

      - name: pyright check
        run: uv run pyright json_repair/

      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit

  # ── Build wheels (tagged releases only) ──────────────────────────────────
  wheels:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - name: Build wheels
        run: uv build --wheel

      - uses: actions/upload-artifact@v5
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
