name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.12"

jobs:
  # ── Rust checks ──────────────────────────────────────────────────────────
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: cargo test
        run: cargo test -p json-repair-core

      - name: cargo clippy
        run: cargo clippy -p json-repair-core -- -D warnings

      - name: cargo bench
        run: cargo bench -p json-repair-core

  # ── Python checks ────────────────────────────────────────────────────────
  python:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: uv sync
        run: uv sync

      - name: pytest
        run: uv run pytest tests/python/ -v

      - name: ruff check
        run: uv run ruff check json_repair/ tests/python/

      - name: mypy check
        run: uv run mypy json_repair/

  # ── Build wheels (Linux x86_64) ──────────────────────────────────────────
  wheels:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheel with maturin
        run: uv run maturin build --release -m crates/json-repair-python/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: target/wheels/*.whl
