[package]
name = "json-repair-core"
version = "0.1.0"
edition = "2024"
description = "Core Rust library for repairing malformed JSON from LLM outputs"
license = "GPL-2.0-only"
repository = "https://gitee.com/mensui/json_repair"
homepage = "https://gitee.com/mensui/json_repair"

[dependencies]
serde_json = "1"

[dev-dependencies]
serde = "1"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "bench_repair"
harness = false
