repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --check --all
        language: system
        pass_filenames: false
        types: [rust]
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --workspace -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]
      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace
        language: system
        pass_filenames: false
        types: [rust]
      - id: cargo-test
        name: cargo test
        entry: cargo test -p json-repair-core
        language: system
        pass_filenames: false
        types: [rust]
      - id: pytest
        name: pytest
        entry: uv run pytest tests/python/ --no-header -q
        language: system
        pass_filenames: false
        types: [python]
