[build-system]
requires = ["hatchling", "hatch-cython", "Cython", "setuptools"]
build-backend = "hatchling.build"

[project]
name = "json-repair"
version = "0.1.17"
description = "Repair malformed JSON from LLM outputs - handles unescaped quotes, triple-quoted strings, and more in a single pass"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["json_repair"]
exclude = [
    "json_repair/_cparse.pyx",
    "json_repair/_cparse.c",
]

[tool.hatch.build.targets.wheel.hooks.cython]
dependencies = ["hatch-cython"]

[tool.hatch.build.targets.wheel.hooks.cython.options]
src = "json_repair"
compile_py = false
directives = { boundscheck = false, wraparound = false, initializedcheck = false, cdivision = true }
language_level = "3"

[tool.hatch.build.targets.sdist]
include = [
    "/json_repair/*.py",
    "/json_repair/*.pyx",
    "/json_repair/*.c",
    "/json_repair/py.typed",
    "/tests",
    "/README.md",
    "/LICENSE",
    "/pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "Cython>=3.0",
    "hypothesis>=6.155.7",
    "mypy>=2.1.0",
    "pre-commit>=4.6.0",
    "pyright>=1.1.410",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-benchmark>=5.2.3",
    "ruff>=0.15.18",
    "setuptools>=75",
]

[tool.mypy]
strict = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.test_repair"
disable_error_code = ["untyped-decorator"]

[tool.ruff]
target-version = "py312"
extend-exclude = ["tests/cases/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"